<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Automation Dashboard</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .dashboard-tabs { display: flex; gap: 20px; margin-bottom: 16px; }
    .tab-btn {
      background: none;
      border: none;
      outline: none;
      cursor: pointer;
      font-size: 18px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .tab-btn.selected {
      background: #e1e7fd;
      border-bottom: 3px solid #1463f3;
    }
    .tab-btn img { margin-right: 8px; }

    /* Username/avatar top right, logout bottom left */
    #dashboard-header {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding: 12px 24px 0 24px;
      box-sizing: border-box;
    }
    #user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #6b8efd;
    }
    #user-name {
      font-size: 1.1rem;
      color: #333;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    #logout-container {
      position: fixed;
      left: 36px;
      bottom: 36px;
      z-index: 999;
    }
    #logout-btn {
      font-size: 18px;
      background: #6b8efd;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      cursor: pointer;
      box-shadow: 1px 2px 10px rgba(70,110,255, 0.10);
    }
  </style>
</head>
<body>

<!-- Auth Section (shows only before login) -->
<div id="auth-section">
  <!-- LOGIN FORM (default visible) -->
  <div id="login-form" style="display: block;">
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p>Don't have an account? <a href="#" onclick="showSignup()">Create New Account</a></p>
    <p id="auth-message"></p>
  </div>
  <!-- SIGNUP FORM (default hidden) -->
  <div id="signup-form" style="display: none;">
    <h2>Sign Up</h2>
    <input type="email" id="signup-email" placeholder="Email">
    <input type="password" id="signup-password" placeholder="Password">
    <button onclick="signUp()">Sign Up</button>
    <p>Already have an account? <a href="#" onclick="showLogin()">Back to Login</a></p>
    <p id="signup-message"></p>
  </div>
</div>

<!-- Dashboard Section (shows only after login) -->
<div id="dashboard-section" style="display: none;">
  <div id="dashboard-header">
    <div id="user-info" style="display:none;">
      <img id="user-avatar" src="" alt="user avatar">
      <span id="user-name"></span>
    </div>
  </div>

  <h1>Welcome to Home Automation</h1>
  <h2 id="welcome-msg" style="color:#22315e; margin-bottom:10px"></h2>
  <div class="dashboard-tabs">
    <button id="device-tab" class="tab-btn">
      <img src="https://img.icons8.com/fluency/48/000000/switch-on.png" height="24"/> Device Control
    </button>
    <button id="sensor-tab" class="tab-btn">
      <img src="https://img.icons8.com/fluency/48/000000/sensor.png" height="24"/> Sensor Data
    </button>
  </div>
  <!-- Device Controls Section (initially hidden) -->
  <div id="devices-section" style="display:none;">
    <h2>Device Controls</h2>
    <button id="voice-btn">🎤 Speak Command</button>
    <span id="voice-status"></span>
    <div class="device-control"> 
      <label>Light 1:</label>
      <button onclick="turnOnDevice('light1')">ON</button>
      <button onclick="turnOffDevice('light1')">OFF</button>
      <span id="light1-status">Status: Unknown</span>
    </div>
    <div class="device-control"> 
  <label>Light 2:</label>
  <button onclick="turnOnDevice('light2')">ON</button>
  <button onclick="turnOffDevice('light2')">OFF</button>
  <span id="light2-status">Status: Unknown</span>
</div>
<div class="device-control"> 
  <label>Light 3:</label>
  <button onclick="turnOnDevice('light3')">ON</button>
  <button onclick="turnOffDevice('light3')">OFF</button>
  <span id="light3-status">Status: Unknown</span>
</div>
    <div class="device-control">
      <label>Fan 1:</label>
      <button onclick="turnOnDevice('fan1')">ON</button>
      <button onclick="turnOffDevice('fan1')">OFF</button>
      <span id="fan1-status">Status: Unknown</span>
    </div>
  </div>
  <!-- Sensor Data Section (initially hidden) -->
  <div id="sensors-section">
    <h2>Sensor Data</h2>
    <canvas id="sensor-chart"></canvas>
    <div>
      <label>Temperature:</label>
      <span id="temp-value">--</span> °C
    </div>
    <div>
      <label>Humidity:</label>
      <span id="humidity-value">--</span> %
    </div>
  </div>
  <!-- Logout button at bottom left corner -->
  <div id="logout-container" style="display:none;">
    <button id="logout-btn" onclick="logout()">Logout</button>

  </div>
  <div id="device-msg" style="color: green; font-weight: bold;"></div>

</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="app.js"></script>
<script>
// Tab switching between device control and sensor data, initially both hidden
document.addEventListener('DOMContentLoaded', function() {
  const deviceTab = document.getElementById('device-tab');
  const sensorTab = document.getElementById('sensor-tab');
  const deviceSection = document.getElementById('devices-section');
  const sensorSection = document.getElementById('sensors-section');
  deviceTab.onclick = function() {
    deviceSection.style.display = 'block';
    sensorSection.style.display = 'none';
    deviceTab.classList.add('selected');
    sensorTab.classList.remove('selected');
  };
  sensorTab.onclick = function() {
    deviceSection.style.display = 'none';
    sensorSection.style.display = 'block';
    deviceTab.classList.remove('selected');
    sensorTab.classList.add('selected');
  };
});
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js">
 
</script>


      
</body>
</html>
